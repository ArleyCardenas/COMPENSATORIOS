<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Funcionarios</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        text-align: center;
        padding: 30px;
      }

      .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        margin: auto;
      }

      select,
      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
      }

      button {
        background: #007bff;
        color: white;
        border: none;
      }

      #mensaje {
        margin-top: 15px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Registro de Funcionarios</h2>

      <select id="funcionario">
        <option value="">Cargando...</option>
      </select>

      <select id="dia">
        <option value="">Seleccione día</option>
        <option>A 2 JUEVES DIA</option>
        <option>B 3 VIERNES NOCHE</option>
         <option>C 4 SABADO  DIA</option>
        <option>D 5 DOMINGO NOCHE</option>
      </select>

      <button onclick="enviar()">Registrar</button>

      <div id="mensaje"></div>
    </div>

    <br />
    <h3 style="text-align: center">📋 Inscritos</h3>
    <table border="1" style="margin: auto; width: 80%; background: white">
      <thead>
        <tr>
          <th>Funcionario</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>

    <script>
      const URL =
        "https://script.google.com/macros/s/AKfycbxJM3dJLYORj1hGwb8knnzzpbm2oLdJoPOoO5e3Ya-yAhZ-vuxWHiXkcTNlLZIJZ_bJ/exec";

      function enviar() {
        const funcionario = document.getElementById("funcionario").value.trim();
        const dia = document.getElementById("dia").value.trim();
        const mensaje = document.getElementById("mensaje");
        const boton = document.querySelector("button");

        // Validación
        if (funcionario === "" || dia === "") {
          mensaje.innerHTML = "⚠️ Debe completar todos los campos";
          return;
        }

        boton.disabled = true;

        fetch(URL, {
          method: "POST",
          body: JSON.stringify({
            funcionario: funcionario,
            dia: dia,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "ok") {
              document.getElementById("funcionario").value = "";
              document.getElementById("dia").value = "";

              mensaje.innerHTML = "✅ Registro exitoso";

              // 🔥 CARGAR TABLA DESPUÉS DEL REGISTRO
              cargarTabla(dia);
            } else {
              mensaje.innerHTML =
                "⚠️ Usted ya se encuentra registrado en este día";

              // 🔥 TAMBIÉN MOSTRAR TABLA
              cargarTabla(dia);
            }
          })
          .catch((error) => {
            mensaje.innerHTML = "❌ Error de conexión";
          })
          .finally(() => {
            boton.disabled = false;
          });
      }

      // 🔥 FUNCIÓN PARA CARGAR LA TABLA
      function cargarTabla(dia) {
        document.getElementById("tabla").innerHTML =
          "<tr><td colspan='2'>⏳ Cargando datos...</td></tr>";

        fetch(`${URL}?dia=${encodeURIComponent(dia)}`)
          .then((res) => res.text())
          .then((text) => {
            try {
              const data = JSON.parse(text);
              const tabla = document.getElementById("tabla");

              if (data.length === 0) {
                tabla.innerHTML = "<tr><td colspan='2'>Sin registros</td></tr>";
                return;
              }

              let filasHTML = "";
              data.forEach((item) => {
                const fecha = new Date(item.fecha).toLocaleString();
                filasHTML += `
          <tr>
            <td>${item.funcionario}</td>
            <td>${fecha}</td>
          </tr>
        `;
              });
              tabla.innerHTML = filasHTML;
            } catch (e) {
              console.error(
                "El servidor no devolvió JSON válido. Respuesta recibida:",
                text,
              );
              document.getElementById("tabla").innerHTML =
                "<tr><td colspan='2'>❌ Error de formato en los datos. Revisa la consola.</td></tr>";
            }
          })
          .catch((error) => {
            console.error("Error en la solicitud Fetch:", error);
            document.getElementById("tabla").innerHTML =
              "<tr><td colspan='2'>❌ Error de conexión al cargar datos</td></tr>";
          });
      }

      // 🔥 FUNCIÓN PARA CARGAR FUNCIONARIOS AL INICIAR
      function cargarFuncionarios() {
        fetch(URL)
          .then((res) => res.json())
          .then((data) => {
            let select = document.getElementById("funcionario");
            select.innerHTML =
              '<option value="">Seleccione funcionario</option>';
            data.forEach((nombre) => {
              let option = document.createElement("option");
              option.value = nombre;
              option.textContent = nombre;
              select.appendChild(option);
            });
          })
          .catch(() => {
            document.getElementById("funcionario").innerHTML =
              "<option>Error al cargar</option>";
          });
      }
      window.onload = cargarFuncionarios;
    </script>
  </body>
</html>
