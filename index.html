<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Funcionarios</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
  padding: 30px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  margin: auto;
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #007bff;
  color: white;
  border: none;
}

#mensaje {
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Registro de Funcionarios</h2>

<select id="funcionario">
  <option value="">Seleccione funcionario</option>
  <option>DG. ARAUJO R</option>
  <option>OTRO FUNCIONARIO</option>
</select>

<select id="dia">
  <option value="">Seleccione día</option>
  <option>A 2 JUEVES DIA</option>
  <option>B 3 VIERNES NOCHE</option>
</select>

<button onclick="enviar()">Registrar</button>

<div id="mensaje"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbz8cS9FqaW4RJPzMqh6aNSZRWh6df-1cjVNmFivdWCh0z7iVYdQLiddGL1dX6Yt4p0B/exec";

function enviar() {

  let funcionario = document.getElementById("funcionario").value.trim();
  let dia = document.getElementById("dia").value.trim();
  let mensaje = document.getElementById("mensaje");
  let boton = document.querySelector("button");

  // Validación
  if (funcionario === "" || dia === "") {
    mensaje.innerHTML = "⚠️ Debe completar todos los campos";
    return;
  }

  // Bloquear botón (evita doble envío)
  boton.disabled = true;

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      funcionario: funcionario,
      dia: dia
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "ok") {

      document.getElementById("funcionario").value = "";
      document.getElementById("dia").value = "";

      mensaje.innerHTML = "✅ Registro exitoso";

    } else {

      mensaje.innerHTML = "⚠️ Usted ya se encuentra registrado en este día";

    }

  })
  .catch(error => {
    mensaje.innerHTML = "❌ Error de conexión";
  })
  .finally(() => {
    boton.disabled = false;
  });
}

</script>

</body>
</html>
